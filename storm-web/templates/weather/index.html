<html lang="en"><head>

    <meta charset="UTF-8">
  
    <title>Weather</title>
    <script src="../../assets/js/client.min.js"></script>
    <script src="../../assets/js/jquery.min.js"></script>
    <script src="../../assets/js/feather.min.js"></script>
    <script src="../../assets/js/location.js"></script>
    <script src="../../assets/js/loc.js"></script>
    
    
  <style>
  @import url('https://fonts.googleapis.com/css?family=Montserrat:400,700,900&display=swap');
  
  :root {
      --accent: #72EDF2;
      --secondary: #5151E5;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.12);
  }
  
  * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
  }
  
  body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #1e3c72 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
  }
  
  .container {
      border-radius: 24px;
      background: rgba(34, 40, 49, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: #ffffff;
      height: 420px;
      max-width: 720px;
      width: 100%;
      box-shadow:
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      overflow: hidden;
  }
  
  .weather-side {
      position: relative;
      height: 100%;
      border-radius: 24px;
      background-image: url("https://images.unsplash.com/photo-1559963110-71b394e7494d?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=675&q=80");
      width: 320px;
      box-shadow: 0 0 30px -10px rgba(0, 0, 0, 0.4);
      transition: transform 400ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
      transform: translateZ(0) scale(1.01);
      float: left;
  }
  
  .weather-side:hover {
      transform: scale(1.04) perspective(1500px) rotateY(8deg);
  }
  
  .weather-gradient {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: linear-gradient(135deg, var(--accent) 0%, var(--secondary) 100%);
      border-radius: 24px;
      opacity: 0.75;
  }
  
  .date-container {
      position: absolute;
      top: 28px;
      left: 28px;
  }
  
  .date-dayname {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
  }
  
  .date-day {
      display: block;
      font-size: 0.85rem;
      opacity: 0.9;
      margin-top: 2px;
  }
  
  .location {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      background: rgba(0, 0, 0, 0.25);
      padding: 6px 12px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
  }
  
  .location-icon {
      height: 0.85em;
      width: auto;
  }
  
  .weather-container {
      position: absolute;
      bottom: 28px;
      left: 28px;
  }
  
  .weather-icon.feather {
      height: 60px;
      width: auto;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
  }
  
  .weather-temp {
      margin: 4px 0 0 0;
      font-weight: 900;
      font-size: 3.8em;
      line-height: 1;
      letter-spacing: -0.02em;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.25);
  }
  
  .weather-desc {
      margin: 6px 0 0 0;
      font-size: 0.95rem;
      font-weight: 600;
      opacity: 0.95;
      letter-spacing: 0.04em;
      text-transform: capitalize;
  }
  
  .info-side {
      position: relative;
      float: left;
      height: 100%;
      padding: 28px 0;
      width: calc(100% - 320px);
  }
  
  .today-info-container {
      padding: 0 28px;
  }
  
  .today-info {
      padding: 18px 20px;
      margin: 0 0 20px 0;
      border-radius: 16px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(8px);
  }
  
  .today-info>div:not(:last-child) {
      margin: 0 0 12px 0;
  }
  
  .today-info>div .title {
      float: left;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.8;
  }
  
  .today-info>div .value {
      float: right;
      font-weight: 700;
      font-size: 0.95rem;
  }
  
  .week-container {
      padding: 0 28px;
  }
  
  .week-list {
      list-style-type: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 10px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 12px;
      backdrop-filter: blur(8px);
  }
  
  .week-list>li {
      flex: 1;
      padding: 14px 8px;
      cursor: pointer;
      transition: all 250ms ease;
      border-radius: 12px;
      text-align: center;
      position: relative;
  }
  
  .week-list>li:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
  }
  
  .week-list>li.active {
      background: rgba(255, 255, 255, 0.95);
      color: #222831;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
  }
  
  .week-list>li .day-name {
      display: block;
      margin: 10px 0 0 0;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
  }
  
  .week-list>li .day-icon {
      display: block;
      height: 28px;
      width: auto;
      margin: 0 auto;
  }
  
  .week-list>li .day-temp {
      display: block;
      text-align: center;
      margin: 8px 0 0 0;
      font-weight: 700;
      font-size: 0.9rem;
  }
  
  .location-container {
      padding: 20px 28px 0;
  }
  
  .location-button {
      outline: none;
      width: 100%;
      box-sizing: border-box;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, var(--accent) 0%, var(--secondary) 100%);
      color: #ffffff;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      box-shadow: 0 10px 25px -5px rgba(81, 81, 229, 0.4);
      cursor: pointer;
      transition: all 250ms ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
  }
  
  .location-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(81, 81, 229, 0.5);
  }
  
  .location-button:active {
      transform: translateY(0);
  }
  
  .location-button .feather {
      height: 1em;
      width: auto;
  }

  @media (max-width: 768px) {
      .container {
          flex-direction: column;
          height: auto;
      }
      .weather-side {
          width: 100%;
          float: none;
          height: 280px;
      }
      .info-side {
          width: 100%;
          float: none;
          padding: 20px 0;
      }
      .week-list {
          flex-wrap: wrap;
      }
  }
  </style>
  
    <script>
    window.console = window.console || function(t) {};
  </script>
  
    
    
    <script>
    if (document.location.search.match(/type=embed/gi)) {
      window.parent.postMessage("resize", "*");
    }
  </script>
  
    
  </head>
  
  <body translate="no" >

      <div class="location-container">
        <button class="location-button" onclick="locate()"> <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-map-pin"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg><span>Change location</span></button>
      </div>
    </div>
  </div>
